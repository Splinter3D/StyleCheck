name: release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean
      environment_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release"
        required: true
        type: string
      prerelease:
        description: "Publish as prerelease"
        required: true
        type: boolean
      environment_name:
        description: "GitHub environment to use"
        required: true
        type: choice
        options:
          - release
          - release-rc

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      environment_name: ${{ steps.vars.outputs.environment_name }}

    steps:
      - name: Resolve release parameters
        id: vars
        run: |
          tag_name="${{ inputs.tag_name || github.ref_name }}"
          prerelease="${{ inputs.prerelease }}"
          environment_name="${{ inputs.environment_name }}"

          if [[ -z "$prerelease" ]]; then
            if [[ "$tag_name" == *-rc.* ]]; then
              prerelease=true
            else
              prerelease=false
            fi
          fi

          if [[ -z "$environment_name" ]]; then
            if [[ "$tag_name" == *-rc.* ]]; then
              environment_name=release-rc
            else
              environment_name=release
            fi
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "environment_name=$environment_name" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.environment_name }}
    needs:
      - prepare
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        run: |
          tag="${{ needs.prepare.outputs.tag_name }}"
          title="Release: ${tag}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists, skipping."
            exit 0
          fi

          args=(
            release create "$tag"
            dist/*
            --title "$title"
            --generate-notes
          )

          if [[ "${{ needs.prepare.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
