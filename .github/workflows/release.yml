name: release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean
      environment_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release"
        required: true
        type: string
      prerelease:
        description: "Publish as prerelease"
        required: true
        type: boolean
      environment_name:
        description: "GitHub environment to use"
        required: true
        type: choice
        options:
          - release
          - release-rc

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      environment_name: ${{ steps.vars.outputs.environment_name }}

    steps:
      - name: Resolve release parameters
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
            echo "environment_name=${{ inputs.environment_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
            echo "environment_name=${{ inputs.environment_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag_name="${GITHUB_REF_NAME}"
          if [[ "$tag_name" == *-rc.* ]]; then
            echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "environment_name=release-rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "environment_name=release" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.environment_name }}
    needs:
      - prepare
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: "Release: ${{ needs.prepare.outputs.tag_name }}"
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
