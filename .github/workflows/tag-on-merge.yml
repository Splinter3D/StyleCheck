name: tag-on-merge

on:
  pull_request_target:
    branches:
      - dev
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: tag-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  tag-dev:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'dev' &&
      github.event.pull_request.head.ref == 'release/dev'
    runs-on: ubuntu-latest
    environment:
      name: release-rc
    outputs:
      tag_name: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: python -m pip install --upgrade pip commitizen

      - name: Compute release candidate tag
        id: version
        run: |
          tag="$(./scripts/next-tag.sh rc)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          tag="${{ steps.version.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release candidate $tag"
          git push origin "$tag"

  release-dev:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'dev' &&
      github.event.pull_request.head.ref == 'release/dev'
    needs: tag-dev
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      tag_name: ${{ needs.tag-dev.outputs.tag_name }}
      prerelease: true
      environment_name: release-rc

  tag-main:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'hotfix/release-main'
    runs-on: ubuntu-latest
    environment:
      name: release
    outputs:
      tag_name: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: python -m pip install --upgrade pip commitizen

      - name: Compute stable tag
        id: version
        run: |
          tag="$(./scripts/next-tag.sh stable)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          tag="${{ steps.version.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

  release-main:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'hotfix/release-main'
    needs: tag-main
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      tag_name: ${{ needs.tag-main.outputs.tag_name }}
      prerelease: false
      environment_name: release
